<DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>"Slope2"</title>
    <style>
        html, body, #unity-container, #unity-canvas {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        #unity-container {
            position: fixed;
            inset: 0;
            display: none;
        }
        #unity-canvas {
            display: block;
        }
        .loading-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .loading-logo {
            margin-bottom: 20px;
        }
        .loading-logo img {
            max-width: 300px;
            max-height: 150px;
        }
        .loading-progress {
            width: 300px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .loading-progress-fill {
            width: 0%;
            height: 100%;
            background: #4CAF50;
            transition: width 0.2s;
        }
        .loading-text {
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-wrapper" class="loading-wrapper">
        <div class="loading-logo">
            <img src="https://cdn.jsdelivr.net/gh/mumbojum2/azgames.io@main/theme/logo.png" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="loading-progress">
            <div id="progress-fill" class="loading-progress-fill"></div>
        </div>
        <div id="loading-text" class="loading-text">Game Loading...</div>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/mumbojum2/azgames.io@main/Build/UnityLoader.js"></script>
    <script>
        // CDN base URL for jsDelivr
        var CDN_BASE = "https://cdn.jsdelivr.net/gh/mumbojum2/azgames.io@main/";
ECHO is off.
        var buildConfig = {
            dataBaseName: "slope-2-v25051901",
            frameworkFile: "slope-2-v25051901.framework.js.unityweb",
            codeFile: "slope-2-v25051901.wasm.unityweb",
            numParts: 1,
            gameName: ""Slope2""
        };
ECHO is off.
        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];
                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        resolve(URL.createObjectURL(new Blob(buffers)));
                        return;
                    }
                    fetch(fileParts[index])
                        .then(r => r.arrayBuffer())
                        .then(d => { buffers.push(d); fetchPart(index+1); })
                        .catch(reject);
                }
                fetchPart(0);
            });
        }
ECHO is off.
        function getParts(baseUrl, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) parts.push(baseUrl + ".part" + i);
            return parts;
        }
ECHO is off.
        window.onload = function() {
            var dataUrl = CDN_BASE + "Build/" + buildConfig.dataBaseName + ".data.unityweb";
ECHO is off.
            function startGame(finalDataUrl) {
                var config = {
                    dataUrl: finalDataUrl,
                    frameworkUrl: CDN_BASE + "Build/" + buildConfig.frameworkFile,
                    codeUrl: CDN_BASE + "Build/" + buildConfig.codeFile,
                    productName: buildConfig.gameName
                };
ECHO is off.
                var progressFill = document.getElementById("progress-fill");
                var loadingText = document.getElementById("loading-text");
                var loadingWrapper = document.getElementById("loading-wrapper");
                var container = document.getElementById("unity-container");
ECHO is off.
                UnityLoader.instantiate("unity-container", config, {
                    onProgress: function(progress) {
                        var percent = Math.round(progress * 100);
                        progressFill.style.width = percent + "%";
                        if (percent < 100) {
                            loadingText.innerText = "Downloading: " + percent + "%";
                        } else {
                            loadingText.innerText = "Starting game...";
                        }
                    }
                }).then(function() {
                    loadingWrapper.style.display = "none";
                    container.style.display = "block";
                }).catch(function(err) {
                    loadingText.innerText = "Error loading game.";
                    console.error(err);
                });
            }
ECHO is off.
            if (buildConfig.numParts > 1) {
                var parts = getParts(dataUrl, 1, buildConfig.numParts);
                mergeFiles(parts).then(startGame).catch(function(e) {
                    console.error(e);
                    loadingText.innerText = "Failed to load game data.";
                });
            } else {
                startGame(dataUrl);
            }
        };
    </script>
</body>
</html>
